<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My IP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <div id="hdr"></div>
  <div class="card">
    <h2 id="h-ip"></h2>
    <pre id="ip-out" class="mono"></pre>
    <div id="ip-actions"></div>
  </div>
  <div class="card">
    <h2 id="h-geo"></h2>
    <pre id="geo-out" class="mono"></pre>
  </div>
  <div class="card">
    <h2 id="h-ping"></h2>
    <pre id="ping-out" class="mono">—</pre>
    <button type="button" class="btn" id="btn-ping"></button>
  </div>
  <script src="common.js"></script>
  <script>
    T2R.initApp();
    const en = T2R.lang() === "en";
    document.getElementById("hdr").appendChild(T2R.header(en ? "My IP" : "IP من", "index.html"));
    document.getElementById("h-ip").textContent = en ? "Public IP" : "IP عمومی";
    document.getElementById("h-geo").textContent = en ? "Location & ISP" : "موقعیت و ISP";
    document.getElementById("h-ping").textContent = en ? "Latency (browser)" : "تأخیر (مرورگر)";
    document.getElementById("btn-ping").textContent = en ? "Test latency" : "تست تأخیر";

    const ipOut = document.getElementById("ip-out");
    const geoOut = document.getElementById("geo-out");
    const pingOut = document.getElementById("ping-out");
    const ipActions = document.getElementById("ip-actions");
    let currentIp = "";

    async function load() {
      ipOut.textContent = T2R.t("loading");
      geoOut.textContent = "…";
      try {
        currentIp = await T2R.publicIp();
        ipOut.textContent = currentIp;
        T2R.addCopyButton(ipActions, () => currentIp);
        const d = await T2R.ipDetails(currentIp);
        const lines = [
          (en ? "Country" : "کشور") + ": " + (d.country || "—") + " " + (d.country_code || ""),
          (en ? "Region" : "استان") + ": " + (d.region || "—"),
          (en ? "City" : "شهر") + ": " + (d.city || "—"),
          "ISP: " + (d.connection && d.connection.isp ? d.connection.isp : d.isp || "—"),
          (en ? "Timezone" : "منطقه زمانی") + ": " + (d.timezone && d.timezone.id ? d.timezone.id : d.timezone || "—"),
        ];
        if (d.latitude != null) lines.push("Lat/Lon: " + d.latitude + ", " + d.longitude);
        geoOut.textContent = lines.join("\n");
      } catch (e) {
        ipOut.textContent = T2R.t("error") + ": " + e;
        geoOut.textContent = "—";
      }
    }

    document.getElementById("btn-ping").onclick = async () => {
      pingOut.textContent = T2R.t("loading");
      const targets = [
        { name: "Cloudflare", url: "https://1.1.1.1" },
        { name: "Google", url: "https://www.google.com/generate_204" },
      ];
      const lines = [];
      for (const t of targets) {
        try {
          const ms = await T2R.latencyMs(t.url, 10000);
          lines.push(t.name + ": ~" + ms + " ms");
        } catch (e) {
          lines.push(t.name + ": " + (en ? "failed" : "ناموفق"));
        }
      }
      pingOut.textContent = lines.join("\n") + "\n\n" + (en ? "(from your device, not the bot server)" : "(از دستگاه شما، نه سرور ربات)");
    };

    load();
  </script>
</body>
</html>
